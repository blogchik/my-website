# docker-compose.yml — Base configuration (shared between dev and prod)
#
# Do NOT use this file alone. It is extended by:
#   docker-compose.override.yml  (dev  — auto-loaded: docker compose up)
#   docker-compose.prod.yml      (prod — explicit:    docker compose -f docker-compose.yml -f docker-compose.prod.yml up)
#
# Or use the Makefile shortcuts:
#   make dev        → development
#   make prod       → production

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001', r => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  db:
    image: postgres:18-alpine
    networks:
      - app-network
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-dev}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

networks:
  app-network:
    driver: bridge

volumes:
  certbot-conf:
  certbot-www:
  pgdata:

# docker-compose.prod.yml — Production overrides
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#   Or: make prod
#
# Prerequisites (run once on a fresh VPS):
#   1. Create .env.prod with real values (DOMAIN, CERTBOT_EMAIL, etc.)
#   2. Ensure DNS A record for DOMAIN points to this VPS
#   3. Open ports 80 and 443 in VPS firewall
#   4. Run: make ssl-init

services:
  frontend:
    build:
      target: runner
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.prod
    restart: unless-stopped

  backend:
    build:
      target: runner
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - .env.prod
    restart: unless-stopped
    # Run migrations before starting the server
    command: >
      sh -c "
        python -m alembic upgrade head &&
        python -m uvicorn src.app.main:app --host 0.0.0.0 --port 4000 --workers 2
      "

  db:
    env_file:
      - .env.prod
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot-conf:/etc/letsencrypt:ro
      - certbot-www:/var/www/certbot:ro
    networks:
      - app-network
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  certbot:
    image: certbot/certbot:latest
    volumes:
      - certbot-conf:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    # Checks for renewal every 12h; only renews when < 30 days remain
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot --webroot-path=/var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped

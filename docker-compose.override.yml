# docker-compose.override.yml — Development overrides (auto-loaded)
#
# Docker Compose automatically merges this file when you run:
#   docker compose up          (or: make dev)
#
# Features:
#   - Hot reload via pnpm dev
#   - Source code bind-mounted into the container
#   - node_modules isolated inside the container (prevents host/container conflicts)
#   - WATCHPACK_POLLING=true for reliable file watching on Linux bind mounts

services:
  backend:
    build:
      target: development
    command: >
      sh -c "
        uv run alembic upgrade head &&
        uv run uvicorn src.app.main:app --reload --host 0.0.0.0 --port 4000
      "
    volumes:
      - ./backend:/app
      - /app/.venv
    ports:
      - "4000:4000"
    env_file:
      - .env.dev
    restart: "no"

  admin:
    build:
      target: development
    command: pnpm dev
    volumes:
      - ./admin:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3001:3001"
    env_file:
      - .env.dev
    environment:
      - WATCHPACK_POLLING=true
    restart: "no"

  db:
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: mywebsite
    restart: "no"

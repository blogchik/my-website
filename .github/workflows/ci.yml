name: CI/CD

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.12"

jobs:
  # ── Frontend: Lint & Build ───────────────────────────────────────────────
  lint-frontend:
    name: "Frontend: Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Load environment variables
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: echo "$ENV_PROD" | grep '^NEXT_PUBLIC_' >> $GITHUB_ENV

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

  # ── Admin: Lint & Build ────────────────────────────────────────────────
  lint-admin:
    name: "Admin: Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: admin

    steps:
      - uses: actions/checkout@v4

      - name: Load environment variables
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: echo "$ENV_PROD" | grep '^NEXT_PUBLIC_' >> $GITHUB_ENV

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "pnpm"
          cache-dependency-path: admin/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: TypeScript check
        run: pnpm exec tsc --noEmit

      - name: Build
        run: pnpm build

  # ── Backend: Lint ────────────────────────────────────────────────────────
  lint-backend:
    name: "Backend: Lint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: uv sync --frozen 2>/dev/null || uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

  # ── Security Scan ────────────────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint-frontend, lint-admin, lint-backend]
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
        continue-on-error: true

  # ── Build & Push Frontend Image ──────────────────────────────────────────
  build-frontend:
    name: "Build & Push: Frontend"
    needs: [lint-frontend, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Load environment variables
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: echo "$ENV_PROD" | grep '^NEXT_PUBLIC_' >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_SITE_URL=${{ env.NEXT_PUBLIC_SITE_URL }}
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}

  # ── Build & Push Admin Image ────────────────────────────────────────────
  build-admin:
    name: "Build & Push: Admin"
    needs: [lint-admin, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Load environment variables
        env:
          ENV_PROD: ${{ secrets.ENV_PROD }}
        run: echo "$ENV_PROD" | grep '^NEXT_PUBLIC_' >> $GITHUB_ENV

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-admin
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=admin
          cache-to: type=gha,mode=max,scope=admin
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_URL=${{ env.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_GITHUB_CLIENT_ID=${{ env.NEXT_PUBLIC_GITHUB_CLIENT_ID }}
            NEXT_PUBLIC_ADMIN_URL=${{ env.NEXT_PUBLIC_ADMIN_URL }}

  # ── Build & Push Backend Image ───────────────────────────────────────────
  build-backend:
    name: "Build & Push: Backend"
    needs: [lint-backend, security]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          target: runner
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          platforms: linux/amd64

  # ── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Dokploy
    needs: [build-frontend, build-admin, build-backend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://abduroziq.uz

    steps:
      - name: Trigger Backend deployment
        run: curl -sf -X POST "${{ secrets.DOKPLOY_WEBHOOK_BACKEND }}"

      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend to stabilize..."
          sleep 20
          for i in $(seq 1 12); do
            if curl -sf https://api.abduroziq.uz/health > /dev/null; then
              echo "Backend healthy after attempt $i"
              break
            fi
            if [ "$i" -eq 12 ]; then
              echo "Backend did not become healthy in time"
              exit 1
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done

      - name: Trigger Frontend deployment
        run: curl -sf -X POST "${{ secrets.DOKPLOY_WEBHOOK_FRONTEND }}"

      - name: Trigger Admin deployment
        run: curl -sf -X POST "${{ secrets.DOKPLOY_WEBHOOK_ADMIN }}"
